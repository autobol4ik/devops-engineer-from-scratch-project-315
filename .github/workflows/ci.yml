---
name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  IMAGE_NAME: autobol4ik/devops-engineer-from-scratch-project-315

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
      - name: Check formatting
        run: ./gradlew spotlessCheck --no-daemon
      - name: Run backend tests
        run: ./gradlew test --no-daemon

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend checks
        run: npm run lint && npm run type-check
      - name: Build frontend
        run: npm run build

  image:
    needs:
      - backend
      - frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://hexlet-3.duckdns.org
    concurrency:
      group: hexlet-3-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Ansible
        run: python -m pip install ansible-core==2.20.7
      - name: Configure deployment access
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          deploy_directory="$RUNNER_TEMP/hexlet-3-deploy"
          install -d -m 0700 "$deploy_directory"
          install -m 0600 /dev/null "$deploy_directory/id_ed25519"
          install -m 0600 /dev/null "$deploy_directory/known_hosts"
          install -m 0600 /dev/null .vault-password

          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" \
            > "$deploy_directory/id_ed25519"
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" \
            > "$deploy_directory/known_hosts"
          printf '%s\n' "$ANSIBLE_VAULT_PASSWORD" > .vault-password

          cat > inventory.yml <<EOF
          ---
          all:
            children:
              application_servers:
                hosts:
                  hexlet-3-vm:
                    ansible_host: ${DEPLOY_HOST}
                    ansible_user: ${DEPLOY_USER}
                    ansible_ssh_private_key_file: ${deploy_directory}/id_ed25519
                    ansible_ssh_common_args: >-
                      -F /dev/null -o BatchMode=yes -o IdentitiesOnly=yes
                      -o StrictHostKeyChecking=yes
                      -o UserKnownHostsFile=${deploy_directory}/known_hosts
          EOF
      - name: Install Ansible dependencies
        run: make prepare
      - name: Deploy application
        run: make deploy IMAGE_TAG="$GITHUB_SHA"
      - name: Remove deployment credentials
        if: always()
        run: |
          rm -f .vault-password inventory.yml
          rm -rf "$RUNNER_TEMP/hexlet-3-deploy"
