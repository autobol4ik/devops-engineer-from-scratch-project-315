---
name: Infrastructure CI/CD

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  IMAGE_NAME: autobol4ik/hexlet-3-bulletin-board

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      app-source-ref: ${{ steps.source.outputs.ref }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Ansible tooling
        run: python -m pip install ansible-core==2.20.7 ansible-lint==26
      - name: Install Ansible dependencies
        run: make prepare
      - name: Read pinned application revision
        id: source
        run: |
          ref="$(make --silent print-app-source-ref)"
          printf '%s\n' "$ref" | grep -Eq '^[0-9a-f]{40}$'
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - name: Check repository boundary and Ansible
        run: make check

  image:
    needs:
      - validate
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3
      - name: Check pinned application image
        env:
          APP_SOURCE_REF: ${{ needs.validate.outputs.app-source-ref }}
        run: docker buildx imagetools inspect "$IMAGE_NAME:$APP_SOURCE_REF"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - validate
      - image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://hexlet-3.duckdns.org
    concurrency:
      group: hexlet-3-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Ansible
        run: python -m pip install ansible-core==2.20.7
      - name: Configure deployment access
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          deploy_directory="$RUNNER_TEMP/hexlet-3-deploy"
          install -d -m 0700 "$deploy_directory"
          install -m 0600 /dev/null "$deploy_directory/id_ed25519"
          install -m 0600 /dev/null "$deploy_directory/known_hosts"
          install -m 0600 /dev/null .vault-password

          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" \
            > "$deploy_directory/id_ed25519"
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" \
            > "$deploy_directory/known_hosts"
          printf '%s\n' "$ANSIBLE_VAULT_PASSWORD" > .vault-password

          cat > inventory.yml <<EOF
          ---
          all:
            children:
              application_servers:
                hosts:
                  hexlet-3-vm:
                    ansible_host: ${DEPLOY_HOST}
                    ansible_user: ${DEPLOY_USER}
                    ansible_ssh_private_key_file: ${deploy_directory}/id_ed25519
                    ansible_ssh_common_args: >-
                      -F /dev/null -o BatchMode=yes -o IdentitiesOnly=yes
                      -o StrictHostKeyChecking=yes
                      -o UserKnownHostsFile=${deploy_directory}/known_hosts
          EOF
      - name: Install Ansible dependencies
        run: make prepare
      - name: Deploy pinned application image
        run: make deploy
      - name: Check public bulletin API
        run: |
          for attempt in {1..20}; do
            echo "Public API check attempt $attempt"
            response="$(
              curl --fail --silent --show-error \
                --max-time 10 \
                https://hexlet-3.duckdns.org/api/bulletins
            )" || true
            if jq -e '
              (.data | type == "array")
              and (.data | length > 0)
              and (.total | type == "number")
              and (.total > 0)
            ' <<<"$response" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1
      - name: Remove deployment credentials
        if: always()
        run: |
          rm -f .vault-password inventory.yml
          rm -rf "$RUNNER_TEMP/hexlet-3-deploy"
